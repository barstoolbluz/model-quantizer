      "VENV_DIR": "$FLOX_ENV_CACHE/venv",
      "WRITE_LOCAL_REPO_LAYOUT": "1"
    },
    "hook": {
      "on-activate": "  mkdir -p \"$MODEL_CACHE_DIR\"\n\n  # Strip non-matching Python version site-packages from PYTHONPATH.\n  # Composed Flox environments (e.g. claude-code.dev) may leak other Python\n  # version paths that confuse the resolver and produce ABI mismatches.\n  _clean_pp=\"\"\n  IFS=':' read -ra _parts <<< \"${PYTHONPATH:-}\"\n  for _p in \"${_parts[@]}\"; do\n    [[ \"$_p\" == *python3.* ]] && [[ \"$_p\" != *python3.13* ]] && continue\n    _clean_pp=\"${_clean_pp:+$_clean_pp:}$_p\"\n  done\n  export PYTHONPATH=\"$VENV_DIR/lib/python3.13/site-packages${_clean_pp:+:$_clean_pp}\"\n\n  \"$FLOX_ENV/bin/setup-venv\" || return 1\n  export PATH=\"$VENV_DIR/bin:$PATH\"\n"
    },
    "profile": {
      "common": ""
    },
    "options": {
      "systems": [
        "aarch64-linux",
        "x86_64-linux"
      ]
    }
  },
